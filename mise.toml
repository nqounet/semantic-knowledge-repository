[tools]
node = "lts"

[tasks.test]
description = "Run unit tests"
run = "npm test"

[tasks.release]
description = "Run tests, bump version (patch), update tags, and push to origin"
depends = ["test"]
run = "npm version patch && git push origin main --tags"

[tasks.version]
description = "Update the version using npm version"
run = "npm version patch"
